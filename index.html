<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discord Studio Pro</title>
  <style>
    :root { --bg: #09090b; --panel: #18181f; --accent: #00d4ff; --text: #e2e2e8; --border: #313142; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }
    #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #09090b; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    .start-btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; }
    .start-btn.ready { opacity: 1; }
    #debug-log { margin-top: 20px; font-family: monospace; font-size: 11px; color: var(--accent); background: #000; padding: 10px; width: 350px; text-align: left; white-space: pre-wrap; height: 150px; overflow-y: auto; border: 1px solid var(--border); }
    .row { display: flex; background: var(--panel); margin: 5px; padding: 10px; border-radius: 5px; }
    .step-btn { width: 30px; height: 50px; margin: 1px; border: none; background: #252530; cursor: pointer; }
  </style>
</head>
<body>

<div id="start-overlay">
  <h1>STUDIO PRO</h1>
  <button id="start-btn" class="start-btn" disabled>CONNECTING...</button>
  <div id="debug-log">Status: Initializing...</div>
</div>

<div id="currentUserDisplay">Connecting...</div>
<div id="rack"></div>

<script type="module">
import { DiscordSDK } from "https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.2.0/+esm";
import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";
import * as Tone from "https://esm.sh/tone@14.8.49";

const BACKEND_URL = "https://beat-backend-5nnu.onrender.com";
const REDIRECT_URI = "https://127.0.0.1";

let socket, discordSdk, discordUsername = "Guest", masterReverb;
let state = { bpm: 120, steps: 16, channels: [] };

const debug = (msg) => { 
    const log = document.getElementById("debug-log");
    log.innerText += "\n> " + msg; 
    log.scrollTop = log.scrollHeight;
};

async function boot() {
  const btn = document.getElementById("start-btn");
  const isDiscord = window.location.hostname.includes("discordsays.com");
  
  let clientId = null;

  // 1. SMART CONFIG FETCH
  while (!clientId) {
    try {
      // If we are in Discord, use the proxy path. If in Browser, use absolute path.
      const configPath = isDiscord ? "/api/config" : `${BACKEND_URL}/api/config`;
      debug("Calling: " + configPath);
      
      const res = await fetch(configPath);
      const data = await res.json();
      clientId = data.clientId;
    } catch (e) {
      debug("Waiting for server to wake up...");
      await new Promise(r => setTimeout(r, 4000));
    }
  }

  debug("Server Found!");
  socket = io(BACKEND_URL);
  setupSocket();

  // 2. DISCORD AUTH
  if (isDiscord) {
    try {
      debug("Discord SDK Init...");
      discordSdk = new DiscordSDK(clientId);
      await discordSdk.ready();
      
      const { code } = await discordSdk.commands.authorize({ 
        client_id: clientId, response_type: "code", state: "", prompt: "none", 
        scope: ["identify"], redirect_uri: REDIRECT_URI 
      });

      const tokenRes = await fetch("/api/token", { 
        method: "POST", headers: {"Content-Type":"application/json"}, 
        body: JSON.stringify({code}) 
      });
      const tokenData = await tokenRes.json();
      const auth = await discordSdk.commands.authenticate({ access_token: tokenData.access_token });
      discordUsername = auth.user.username;
      debug("Logged in as " + discordUsername);
    } catch (err) {
      debug("Discord Error: " + err.message);
    }
  } else {
    debug("Web Browser Mode.");
    discordUsername = "Web_User_" + Math.floor(Math.random()*99);
  }

  btn.innerText = "ENTER STUDIO";
  btn.classList.add("ready");
  btn.disabled = false;
  btn.onclick = window.initAudio;
}

window.initAudio = async () => {
  await Tone.start();
  masterReverb = new Tone.Reverb({ decay: 2 }).toDestination();
  document.getElementById("start-overlay").style.display = "none";
  document.getElementById("currentUserDisplay").innerText = "User: " + discordUsername;
  buildGrid();
};

function buildGrid() {
  const rack = document.getElementById("rack");
  rack.innerHTML = "";
  state.channels.forEach(ch => {
    const row = document.createElement("div"); row.className = "row";
    row.innerHTML = `<span>${ch.author}</span>`;
    const steps = document.createElement("div");
    ch.pattern.forEach((a, i) => {
      const b = document.createElement("button"); b.className = "step-btn";
      b.style.background = a ? "var(--accent)" : "";
      b.onclick = () => socket.emit("toggleStep", { channelId: ch.id, stepIndex: i, val: !a });
      steps.appendChild(b);
    });
    row.appendChild(steps); rack.appendChild(row);
  });
  const add = document.createElement("button"); add.innerText = "+ ADD TRACK";
  add.onclick = () => socket.emit("addTrack", discordUsername);
  rack.appendChild(add);
}

function setupSocket() {
  socket.on("initState", (s) => { state = s; buildGrid(); });
  socket.on("stateUpdate", (s) => { state = s; buildGrid(); });
}

boot();
</script>
</body>
</html>
