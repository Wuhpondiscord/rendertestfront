<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Studio Pro</title>

  <!-- Tone.js loaded synchronously so it's globally available before any script runs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <!-- lamejs for MP3 encoding -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #07070b;
      --panel:       #10101a;
      --panel-lt:    #181828;
      --panel-hov:   #1e1e30;
      --text:        #dddde8;
      --muted:       #6a6a88;
      --dim:         #38385a;
      --border:      #20203a;
      --border-hi:   #32325a;
      --accent:      #00d4ff;
      --accent-d:    rgba(0,212,255,.13);
      --accent-g:    rgba(0,212,255,.4);
      --danger:      #ff3060;
      --rec:         #ff4444;
      --rec-g:       rgba(255,68,68,.45);
      --ok:          #00e5a0;
      --warn:        #ffb800;
      --s-dark:      #16162a;
      --s-mid:       #1c1c30;
      --mono:        'Space Mono', monospace;
      --sans:        'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans);
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; user-select: none;
    }

    /* ══ OVERLAY ══════════════════════════════════════════════ */
    #overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; z-index: 9999;
    }
    .ov-logo { font-family: var(--mono); font-size: 24px; letter-spacing: 8px; color: var(--accent); text-shadow: 0 0 40px var(--accent-g); margin-bottom: 6px; }
    .ov-sub  { font-family: var(--mono); font-size: 9px; letter-spacing: 5px; color: var(--muted); margin-bottom: 28px; }
    .ov-bar  { width: 200px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 8px; }
    .ov-fill { height: 100%; width: 0; background: var(--accent); box-shadow: 0 0 8px var(--accent-g); transition: width .35s; }
    #ov-msg  { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--muted); margin-bottom: 22px; }
    #enter-btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: 3px;
      background: var(--border); color: var(--muted); border: 1px solid var(--border-hi);
      padding: 11px 34px; border-radius: 3px; cursor: not-allowed; transition: all .2s;
    }
    #enter-btn.ready { background: var(--accent); color: #000; border-color: var(--accent); cursor: pointer; box-shadow: 0 0 22px var(--accent-g); }
    #enter-btn.ready:hover { transform: scale(1.04); }

    /* ══ TOP BAR ══════════════════════════════════════════════ */
    .topbar {
      flex-shrink: 0; height: 44px; background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
    }
    .tbl { display: flex; align-items: center; gap: 7px; }
    .proj-name { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 1px; margin-right: 4px; }
    .tbtn {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 3px; cursor: pointer; transition: all .13s; outline: none;
    }
    .tbtn:hover { background: var(--panel-hov); color: var(--text); border-color: var(--border-hi); }
    .tbtn.hi { border-color: var(--accent); color: var(--accent); }
    .tbtn.hi:hover { background: var(--accent-d); }
    #proj-loader {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
      background: var(--panel); color: var(--muted); border: 1px solid var(--border);
      padding: 5px 8px; border-radius: 3px; cursor: pointer; outline: none;
    }
    #user-disp { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    /* ══ TRANSPORT ════════════════════════════════════════════ */
    .transport {
      flex-shrink: 0; height: 50px; background: var(--panel-lt);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; position: relative; padding: 0 14px;
    }
    .t-left  { position: absolute; left: 14px; display: flex; align-items: center; gap: 10px; }
    .t-right { position: absolute; right: 14px; display: flex; gap: 6px; }
    #status {
      font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 2px;
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px; color: var(--muted);
    }
    #status.live { color: var(--ok); border-color: var(--ok); text-shadow: 0 0 6px var(--ok); }
    #users { font-family: var(--mono); font-size: 9px; color: var(--muted); }
    .tt {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      padding: 6px 13px; border-radius: 3px; cursor: pointer; transition: all .13s; outline: none;
    }
    .tt:hover { background: var(--panel-hov); border-color: var(--border-hi); }
    #play-btn { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; min-width: 80px; box-shadow: 0 0 14px var(--accent-g); }
    #play-btn:hover { box-shadow: 0 0 22px var(--accent-g); }
    #play-btn.on { background: #eee; border-color: #eee; color: #000; }
    #rec-btn { color: var(--rec); border-color: var(--rec); min-width: 100px; }
    #rec-btn.on { background: var(--rec); color: #fff; border-color: var(--rec); box-shadow: 0 0 14px var(--rec-g); animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.55} }
    .ctrl { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 3px; }
    .ctrl-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--dim); }
    .ctrl-val { font-family: var(--mono); font-size: 11px; color: var(--text); min-width: 28px; }
    .ctrl-sel { font-family: var(--mono); font-size: 10px; background: transparent; color: var(--text); border: none; outline: none; cursor: pointer; }
    input[type=range] { accent-color: var(--accent); background: var(--border); height: 3px; border-radius: 2px; outline: none; cursor: pointer; }

    /* ══ BEATS BAR ════════════════════════════════════════════ */
    .beats-bar {
      flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px; padding: 5px 14px; overflow-x: auto; min-height: 36px;
    }
    .beats-bar::-webkit-scrollbar { height: 3px; }
    .beats-bar::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
    .beats-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 3px; color: var(--dim); white-space: nowrap; margin-right: 4px; }
    .beat-tab {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      background: var(--panel); color: var(--muted); border: 1px solid var(--border);
      padding: 4px 13px; border-radius: 3px; cursor: pointer; transition: all .13s; outline: none;
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .beat-tab:hover { background: var(--panel-hov); border-color: var(--border-hi); }
    .beat-tab.active { background: var(--accent-d); border-color: var(--accent); color: var(--accent); }
    .bt-del { font-size: 10px; color: var(--dim); line-height: 1; background: none; border: none; cursor: pointer; }
    .bt-del:hover { color: var(--danger) !important; }
    .beat-add {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      background: transparent; color: var(--dim); border: 1px dashed var(--border-hi);
      padding: 4px 12px; border-radius: 3px; cursor: pointer; transition: all .13s; outline: none; white-space: nowrap;
    }
    .beat-add:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ RACK ═════════════════════════════════════════════════ */
    .rack-wrap { flex: 1; overflow: auto; background: var(--bg); padding: 10px 14px 60px; }
    .rack-wrap::-webkit-scrollbar { width: 7px; height: 7px; }
    .rack-wrap::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    #rack { display: inline-flex; flex-direction: column; gap: 4px; min-width: 100%; }

    /* Layer row */
    .lrow {
      display: flex; align-items: stretch;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 5px; min-width: max-content; transition: border-color .13s;
    }
    .lrow:hover { border-color: var(--border-hi); }

    /* Layer control panel */
    .lctrl {
      position: sticky; left: 0; z-index: 10;
      background: var(--panel); border-right: 1px solid var(--border);
      border-radius: 5px 0 0 5px;
      width: 295px; flex-shrink: 0;
      display: flex; flex-direction: column; justify-content: center; gap: 5px;
      padding: 7px 11px;
    }
    .lhdr { display: flex; justify-content: space-between; align-items: center; }
    .l-author { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .l-label {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
      background: transparent; border: none; border-bottom: 1px solid transparent; outline: none;
      color: var(--muted); cursor: text; width: 75px;
    }
    .l-label:focus { color: var(--text); border-bottom-color: var(--accent); }
    .l-acts { display: flex; gap: 3px; }
    .ibtn {
      background: transparent; border: none; cursor: pointer;
      font-family: var(--mono); font-size: 10px; color: var(--dim);
      padding: 2px 5px; border-radius: 3px; transition: all .1s; line-height: 1;
    }
    .ibtn:hover { background: var(--panel-hov); color: var(--text); }
    .ibtn.muted  { color: var(--danger) !important; }
    .ibtn.soloed { color: var(--warn)   !important; }
    .ibtn.del:hover { color: var(--danger); }

    .lr1, .lr2 { display: flex; align-items: center; gap: 4px; }

    /* instrument select */
    .isel {
      font-family: var(--sans); font-size: 11px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 3px 5px; height: 26px; outline: none; cursor: pointer; flex: 1;
    }
    .isel:focus { border-color: var(--accent); }
    .msel {
      font-family: var(--mono); font-size: 9px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 2px 4px; height: 26px; outline: none; cursor: pointer;
    }
    .msel:focus { border-color: var(--accent); }

    /* volume row */
    .vol-row { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 7px; flex: 1; }
    .vol-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px; color: var(--dim); }
    .vol-row input[type=range] { flex: 1; width: unset; }
    .vol-num { font-family: var(--mono); font-size: 9px; color: var(--muted); min-width: 34px; text-align: right; }

    /* sample btn */
    .samp { font-size: 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; height: 26px; cursor: pointer; transition: border-color .13s; }
    .samp:hover { border-color: var(--accent); }
    .samp.loaded { border-color: var(--ok); }

    /* ══ STEPS ════════════════════════════════════════════════ */
    .steps { display: flex; align-items: center; gap: 2px; padding: 8px 12px; }
    .sgap  { width: 5px; flex-shrink: 0; }
    .sbtn  {
      width: 28px; height: 48px; flex-shrink: 0;
      border-radius: 3px; border: 1px solid transparent; padding: 0;
      cursor: pointer; transition: background .07s, border-color .07s;
    }
    .sbtn.d0 { background: var(--s-dark); }
    .sbtn.d1 { background: var(--s-mid);  }
    .sbtn.on { border-color: transparent !important; }
    .sbtn.hd { border-color: rgba(255,255,255,.8) !important; }
    .sbtn:hover { filter: brightness(1.35); }

    /* ══ ADD LAYER ════════════════════════════════════════════ */
    .add-layer {
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      background: transparent; color: var(--dim); border: 1px dashed var(--border-hi);
      padding: 10px; border-radius: 4px; cursor: pointer; width: 295px;
      transition: all .13s; margin-top: 4px;
    }
    .add-layer:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ TOASTS ═══════════════════════════════════════════════ */
    #toasts { position: fixed; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 7px; z-index: 9998; pointer-events: none; }
    .toast {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      background: var(--panel-lt); border: 1px solid var(--border-hi); color: var(--text);
      padding: 9px 15px; border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,.55);
      animation: tin .2s ease;
    }
    .toast.ok  { border-color: var(--ok);     color: var(--ok);     }
    .toast.err { border-color: var(--danger);  color: var(--danger); }
    @keyframes tin { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    select option, select optgroup { background: #1a1a2e; }
  </style>
</head>
<body>

<!-- ══════ OVERLAY ══════ -->
<div id="overlay">
  <div class="ov-logo">DISCORD STUDIO PRO</div>
  <div class="ov-sub">COLLABORATIVE BEAT MAKER</div>
  <div class="ov-bar"><div class="ov-fill" id="ov-fill"></div></div>
  <div id="ov-msg">INITIALIZING...</div>
  <button id="enter-btn" disabled>CONNECTING...</button>
</div>

<!-- ══════ TOP BAR ══════ -->
<div class="topbar">
  <div class="tbl">
    <span class="proj-name" id="proj-name">Untitled Session</span>
    <button class="tbtn hi" onclick="W.saveProject()">SAVE</button>
    <button class="tbtn"    onclick="W.renameProject()">RENAME</button>
    <select id="proj-loader" onchange="W.loadProject(this.value)">
      <option value="">LOAD PROJECT...</option>
    </select>
  </div>
  <div id="user-disp">Authenticating...</div>
</div>

<!-- ══════ TRANSPORT ══════ -->
<div class="transport">
  <div class="t-left">
    <div id="status">OFFLINE</div>
    <div id="users">● 0</div>
  </div>

  <button id="rec-btn" class="tt" onclick="W.toggleRecord()">⬤ RECORD</button>
  <button id="play-btn" class="tt" onclick="W.togglePlay()">▶ PLAY</button>
  <button class="tt" onclick="W.stopTransport()">■ STOP</button>
  <button class="tt" onclick="W.clearGrid()">✕ CLEAR</button>

  <div class="ctrl">
    <span class="ctrl-lbl">STEPS</span>
    <select class="ctrl-sel" id="step-sel" onchange="W.changeSteps(+this.value)">
      <option value="16">16</option><option value="32">32</option><option value="64">64</option>
    </select>
  </div>

  <div class="ctrl">
    <span class="ctrl-lbl">BPM</span>
    <input type="range" id="bpm-sl" min="40" max="220" value="120" style="width:90px"
      oninput="W.bpmUI(+this.value)" onchange="W.sendBPM(+this.value)" />
    <span class="ctrl-val" id="bpm-val">120</span>
  </div>

  <div class="t-right">
    <button class="tt" style="color:var(--ok);border-color:var(--ok)" onclick="W.exportAudio()">⬇ EXPORT</button>
  </div>
</div>

<!-- ══════ BEATS BAR ══════ -->
<div class="beats-bar">
  <span class="beats-lbl">BEATS:</span>
  <div id="beat-tabs" style="display:flex;gap:6px;align-items:center;"></div>
  <button class="beat-add" onclick="W.addBeat()">+ NEW BEAT</button>
</div>

<!-- ══════ RACK ══════ -->
<div class="rack-wrap">
  <div id="rack"></div>
</div>

<!-- ══════ TOASTS ══════ -->
<div id="toasts"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  DISCORD STUDIO PRO  —  Client
//  Uses plain <script> (not module) so Tone.js + socket.io (loaded
//  dynamically) are always in scope without import timing issues.
// ════════════════════════════════════════════════════════════════════

const BACKEND = "https://beat-backend-5nnu.onrender.com";
// ↑ For Discord proxy deployment, set this to "" and configure URL
//   mappings in the Discord Dev Portal: /backend → beat-backend-5nnu.onrender.com

const W = window;  // all onclick= attributes call W.xxx()

// ── audio nodes ─────────────────────────────────────────────────
let masterOut, masterVerb, recorder;

// ── socket ──────────────────────────────────────────────────────
let socket;

// ── discord sdk ─────────────────────────────────────────────────
let discordSdk;

// ── local session info ──────────────────────────────────────────
let username  = "Producer";
let userId    = null;
let tick32    = 0;
let playing   = false;
let recording = false;
let mutedSet  = new Set();   // layerIds that are muted (local only)
let soloId    = null;        // layerId that is soloed (local only)

// ── per-layer audio ─────────────────────────────────────────────
// synthMap[layerId] = { key: string, node: ToneNode, isPlayer: bool }
let synthMap  = {};
// customMap[layerId] = { url, name } for uploaded samples
let customMap = {};
// layerBtns[layerId] = [btn, ...] for playhead updates
let layerBtns = {};

// ── server state mirror ─────────────────────────────────────────
// Beats replace what was called "patterns". Layers replace "channels/tracks".
let S = {
  projectName : "Untitled Session",
  bpm         : 120,
  steps       : 16,
  beats       : [{ id: "beat_1", name: "Beat 1", layers: [] }],
  activeBeat  : "beat_1",
};

// ════════════════════════════════════════════════════════════════
//  SYNTH LIBRARY
//  Every factory() returns a fresh, unconnected Tone node.
//  We connect it to masterVerb in spawnSynth().
// ════════════════════════════════════════════════════════════════
const SYNTHS = {
  "DRUMS — Kicks": {
    "Kick 808"      : () => new Tone.MembraneSynth({ pitchDecay:.005, octaves:2,  envelope:{attack:.01, decay:.8,  sustain:.1} }),
    "Kick House"    : () => new Tone.MembraneSynth({ pitchDecay:.1,   octaves:5,  envelope:{attack:.005,decay:.4,  sustain:.0} }),
    "Kick Sub"      : () => new Tone.MembraneSynth({ pitchDecay:.05,  octaves:2,  envelope:{attack:.01, decay:.6,  sustain:.0} }),
    "Kick Techno"   : () => new Tone.MembraneSynth({ pitchDecay:.08,  octaves:4,  envelope:{attack:.005,decay:.35, sustain:.0} }),
  },
  "DRUMS — Snares": {
    "Snare Trap"    : () => new Tone.NoiseSynth({ noise:{type:"pink"},  envelope:{attack:.001,decay:.12,sustain:0,release:.05} }),
    "Snare Acoustic": () => new Tone.NoiseSynth({ noise:{type:"white"}, envelope:{attack:.005,decay:.22,sustain:0,release:.08} }),
    "Clap Studio"   : () => new Tone.NoiseSynth({ noise:{type:"white"}, envelope:{attack:.001,decay:.28,sustain:0,release:.1}  }),
    "Clap Wide"     : () => new Tone.NoiseSynth({ noise:{type:"pink"},  envelope:{attack:.01, decay:.45,sustain:0,release:.1}  }),
  },
  "DRUMS — Hats & Perc": {
    "Hi-Hat Closed" : () => new Tone.MetalSynth({ frequency:400, envelope:{attack:.001,decay:.045,release:.01}, harmonicity:5.1,  modulationIndex:32, resonance:4000, octaves:1.5 }),
    "Hi-Hat Open"   : () => new Tone.MetalSynth({ frequency:250, envelope:{attack:.001,decay:.32, release:.05}, harmonicity:5.1,  modulationIndex:32, resonance:4000, octaves:1.5 }),
    "Ride"          : () => new Tone.MetalSynth({ frequency:180, envelope:{attack:.001,decay:.55, release:.08}, harmonicity:5.1,  modulationIndex:16, resonance:3500, octaves:1   }),
    "Cowbell"       : () => new Tone.MetalSynth({ frequency:550, envelope:{attack:.001,decay:.22, release:.05}, harmonicity:5.1,  modulationIndex:16, resonance:5000, octaves:0.5 }),
    "Shaker"        : () => new Tone.NoiseSynth({ noise:{type:"brown"}, envelope:{attack:.005,decay:.065,sustain:0,release:.02} }),
    "Rimshot"       : () => new Tone.MembraneSynth({ pitchDecay:.01, octaves:2, envelope:{attack:.001,decay:.055,sustain:.0} }),
  },
  "BASS": {
    "Bass Sine"     : () => new Tone.MonoSynth({ oscillator:{type:"sine"},      envelope:{attack:.01,decay:.4, sustain:.6,release:.2} }),
    "Bass Acid"     : () => new Tone.MonoSynth({ oscillator:{type:"sawtooth"},  filter:{Q:5,type:"lowpass"},   filterEnvelope:{attack:.01,decay:.2,sustain:.4,release:.2,baseFrequency:200,octaves:3}, envelope:{attack:.01,decay:.3,sustain:.5,release:.2} }),
    "Bass Square"   : () => new Tone.MonoSynth({ oscillator:{type:"square"},    envelope:{attack:.01,decay:.3, sustain:.5,release:.2} }),
    "Bass Reese"    : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"fatsawtooth",count:3,spread:20}, envelope:{attack:.02,decay:.4,sustain:.6,release:.3} }),
    "Bass Pluck"    : () => new Tone.PluckSynth({ attackNoise:1.5, dampening:3000, resonance:0.96 }),
  },
  "KEYS & PIANO": {
    "Grand Piano"   : () => new Tone.PolySynth(Tone.Synth,   { oscillator:{type:"triangle"}, envelope:{attack:.01,decay:1.5,sustain:.1,release:1.2} }),
    "Electric Piano": () => new Tone.PolySynth(Tone.FMSynth,  { harmonicity:2,  modulationIndex:1.5,  envelope:{decay:.8,sustain:.3} }),
    "FM Tine"       : () => new Tone.PolySynth(Tone.FMSynth,  { harmonicity:1,  modulationIndex:1     }),
    "Church Organ"  : () => new Tone.PolySynth(Tone.Synth,   { oscillator:{type:"fatsquare",count:3}, envelope:{attack:.03,sustain:.9,release:.3} }),
    "Harpsichord"   : () => new Tone.PluckSynth({ attackNoise:2, dampening:4000, resonance:0.95 }),
  },
  "PADS & STRINGS": {
    "Strings"       : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"fatsawtooth",count:5}, envelope:{attack:.4,release:1.2} }),
    "Pad Dream"     : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"fatsine",spread:30},   envelope:{attack:1,  release:2  } }),
    "Pad Dark"      : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"fatsawtooth",spread:20},envelope:{attack:1.5,release:2  } }),
    "Choir FM"      : () => new Tone.PolySynth(Tone.FMSynth, { harmonicity:.5,  modulationIndex:5    }),
    "Atmosphere"    : () => new Tone.PolySynth(Tone.AMSynth, { harmonicity:.5,  envelope:{attack:2,release:3} }),
  },
  "LEADS & FX": {
    "Lead Saw"      : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"fatsawtooth",count:3,spread:15} }),
    "Lead Square"   : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"square"} }),
    "Lead Sine"     : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"sine"}, portamento:.15 }),
    "8-Bit"         : () => new Tone.PolySynth(Tone.Synth, { oscillator:{type:"pulse",width:.25} }),
    "AM Buzz"       : () => new Tone.PolySynth(Tone.AMSynth, { harmonicity:2 }),
    "Sub Drop"      : () => new Tone.MembraneSynth({ pitchDecay:.5, octaves:10 }),
  },
};

const DRUM_NAMES = new Set([
  "Kick 808","Kick House","Kick Sub","Kick Techno",
  "Snare Trap","Snare Acoustic","Clap Studio","Clap Wide",
  "Hi-Hat Closed","Hi-Hat Open","Ride","Cowbell","Shaker","Rimshot",
  "Sub Drop",
]);

function isDrum(instKey) { return DRUM_NAMES.has(instKey); }

function getSynthFactory(key) {
  for (const cat of Object.values(SYNTHS)) {
    if (cat[key]) return cat[key];
  }
  return SYNTHS["KEYS & PIANO"]["Grand Piano"];
}

// Create a new synth node for a layer and connect it.
// Returns the synthMap entry.
function spawnSynth(layerId, key) {
  // Dispose previous
  const old = synthMap[layerId];
  if (old) { try { old.node.dispose(); } catch(e){} }

  if (!masterVerb) return null;  // audio not init yet

  const node = getSynthFactory(key)();
  node.connect(masterVerb);

  const entry = { key, node, isPlayer: false };
  synthMap[layerId] = entry;
  return entry;
}

function setVol(layerId, db) {
  const e = synthMap[layerId];
  if (!e) return;
  try { e.node.volume.value = parseFloat(db); } catch(_) {}
}

function toast(msg, type) {
  const el = document.createElement("div");
  el.className = "toast" + (type ? " "+type : "");
  el.textContent = msg;
  const c = document.getElementById("toasts");
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function ovMsg(msg, pct) {
  document.getElementById("ov-msg").textContent = msg;
  if (pct !== undefined) document.getElementById("ov-fill").style.width = pct + "%";
}

function userColor(name) {
  let h = 0;
  for (const c of (name || "?")) h = (h << 5) - h + c.charCodeAt(0);
  return `hsl(${Math.abs(h)%360},70%,62%)`;
}

function getActiveBeat() {
  return S.beats.find(b => b.id === S.activeBeat) || S.beats[0] || null;
}

const NOTES = [];
for (const oct of [1,2,3,4,5])
  for (const n of ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"])
    NOTES.push(n + oct);

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
async function boot() {
  ovMsg("LOADING SOCKET.IO...", 15);

  // Load socket.io from backend (stays in proxy chain for Discord)
  await new Promise(res => {
    const s = document.createElement("script");
    s.src = BACKEND + "/socket.io/socket.io.js";
    s.onload = res;
    s.onerror = () => {
      const s2 = document.createElement("script");
      s2.src = "https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js";
      s2.onload = res; s2.onerror = res;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });

  ovMsg("CONNECTING TO SERVER...", 35);
  try {
    socket = io(BACKEND, { transports: ["websocket"], timeout: 8000 });
    setupSocket();
  } catch(e) { console.warn("Socket error:", e); }

  ovMsg("FETCHING CONFIG...", 55);
  let clientId = null;
  try {
    const r = await fetch(BACKEND + "/api/config");
    const j = await r.json();
    clientId = j.clientId;
  } catch(e) { console.warn("Config fetch failed:", e); }

  // Discord SDK OAuth (only when running inside Discord iframe)
  const inDiscord = new URLSearchParams(location.search).has("frame_id");
  if (inDiscord && clientId) {
    ovMsg("DISCORD AUTH...", 75);
    try {
      // Dynamic import so non-Discord usage doesn't break
      const { DiscordSDK } = await import("https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.2.0/+esm");
      discordSdk = new DiscordSDK(clientId);
      await discordSdk.ready();
      const { code } = await discordSdk.commands.authorize({
        client_id: clientId, response_type: "code",
        prompt: "none", scope: ["identify"],
      });
      const tr  = await fetch(BACKEND + "/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      });
      const { access_token } = await tr.json();
      const auth = await discordSdk.commands.authenticate({ access_token });
      username = auth.user.global_name || auth.user.username;
      userId   = auth.user.id;
    } catch(e) { console.warn("Discord auth error:", e); }
  }

  ovMsg("READY", 100);
  const btn = document.getElementById("enter-btn");
  btn.textContent = "ENTER STUDIO";
  btn.classList.add("ready");
  btn.disabled = false;
  btn.onclick = enterStudio;
}

// ── enter studio (MUST be triggered by user gesture for AudioContext) ──
async function enterStudio() {
  await Tone.start();

  masterOut  = new Tone.Gain(0.82).toDestination();
  masterVerb = new Tone.Reverb({ decay: 2.2, wet: 0.12 });
  await masterVerb.ready;
  masterVerb.connect(masterOut);

  recorder = new Tone.Recorder();
  masterOut.connect(recorder);

  document.getElementById("overlay").style.display = "none";

  const col = userColor(username);
  document.getElementById("user-disp").textContent = "● " + username;
  document.getElementById("user-disp").style.color = col;

  startLoop();
  buildUI();
}

// ════════════════════════════════════════════════════════════════
//  SEQUENCER LOOP
// ════════════════════════════════════════════════════════════════
function startLoop() {
  Tone.Transport.scheduleRepeat((time) => {
    const beat = getActiveBeat();
    if (!beat) { tick32++; return; }

    beat.layers.forEach(layer => {
      if (mutedSet.has(layer.id)) return;
      if (soloId && soloId !== layer.id) return;

      const mult = layer.bpmMult || 1;
      const div  = Math.max(1, Math.round(2 / mult));
      if (tick32 % div !== 0) return;

      const step = Math.floor(tick32 / div) % S.steps;
      if (!layer.pattern || !layer.pattern[step]) return;

      const inst = synthMap[layer.id];
      if (!inst) return;

      try {
        if (inst.isPlayer) {
          inst.node.stop(time);
          inst.node.start(time);
        } else {
          inst.node.triggerAttackRelease(layer.note || "C4", "16n", time);
        }
      } catch(_) {}
    });

    Tone.Draw.schedule(() => drawHead(tick32), time);
    tick32++;
  }, "32n");
}

function drawHead(t) {
  const beat = getActiveBeat();
  if (!beat) return;
  beat.layers.forEach(layer => {
    const btns = layerBtns[layer.id];
    if (!btns) return;
    const div  = Math.max(1, Math.round(2 / (layer.bpmMult || 1)));
    if (t % div !== 0) return;
    const step = Math.floor(t / div) % S.steps;
    btns.forEach((b, i) => {
      if (i === step) b.classList.add("hd");
      else            b.classList.remove("hd");
    });
  });
}

function buildUI() {
  document.getElementById("proj-name").textContent = S.projectName;
  document.getElementById("bpm-sl").value          = S.bpm;
  document.getElementById("bpm-val").textContent   = S.bpm;
  document.getElementById("step-sel").value        = S.steps;
  buildBeatTabs();
  buildRack();
}

// ── Beat tabs ────────────────────────────────────────────────────
function buildBeatTabs() {
  const wrap = document.getElementById("beat-tabs");
  wrap.innerHTML = "";

  S.beats.forEach(beat => {
    const tab = document.createElement("button");
    tab.className = "beat-tab" + (beat.id === S.activeBeat ? " active" : "");

    const nameSpan = document.createElement("span");
    nameSpan.textContent = beat.name;

    // Double-click renames inline
    nameSpan.ondblclick = (e) => {
      e.stopPropagation();
      const inp = document.createElement("input");
      inp.value = beat.name;
      inp.style.cssText = "font-family:var(--mono);font-size:10px;background:transparent;color:var(--text);border:none;outline:none;width:80px";
      inp.onclick = e => e.stopPropagation();
      inp.onblur  = () => { if (inp.value.trim()) socket.emit("renameBeat", { beatId: beat.id, name: inp.value.trim() }); };
      inp.onkeydown = e => { if (e.key==="Enter") inp.blur(); if (e.key==="Escape"){inp.value=beat.name;inp.blur();} };
      nameSpan.replaceWith(inp);
      inp.focus(); inp.select();
    };

    tab.onclick = () => socket.emit("switchBeat", beat.id);
    tab.appendChild(nameSpan);

    if (S.beats.length > 1) {
      const del = document.createElement("button");
      del.className = "ibtn bt-del del";
      del.textContent = "✕";
      del.onclick = (e) => { e.stopPropagation(); if (confirm("Delete beat \""+beat.name+"\"?")) socket.emit("deleteBeat", beat.id); };
      tab.appendChild(del);
    }

    wrap.appendChild(tab);
  });
}

// ── Rack ─────────────────────────────────────────────────────────
function buildRack() {
  const rack = document.getElementById("rack");
  rack.innerHTML = "";
  layerBtns = {};

  const beat = getActiveBeat();
  if (!beat) return;

  // Sync / prune synth nodes
  beat.layers.forEach(layer => {
    const existing = synthMap[layer.id];
    if (!existing) {
      // No node yet — create one unless it's a custom sample that hasn't been uploaded this session
      if (layer.inst !== "__CUSTOM__") spawnSynth(layer.id, layer.inst || "Grand Piano");
    } else if (!existing.isPlayer && existing.key !== (layer.inst || "Grand Piano")) {
      spawnSynth(layer.id, layer.inst || "Grand Piano");
    }
    setVol(layer.id, layer.vol ?? -6);
  });
  // Dispose orphan nodes
  for (const id of Object.keys(synthMap)) {
    if (!beat.layers.find(l => l.id === id)) {
      try { synthMap[id].node.dispose(); } catch(_) {}
      delete synthMap[id];
    }
  }

  beat.layers.forEach(layer => buildLayerRow(rack, beat, layer));

  const addBtn = document.createElement("button");
  addBtn.className = "add-layer";
  addBtn.textContent = "+ ADD LAYER";
  addBtn.onclick = () => socket.emit("addLayer", { beatId: beat.id, author: username });
  rack.appendChild(addBtn);
}

function buildLayerRow(rack, beat, layer) {
  const col    = userColor(layer.author || username);
  const muted  = mutedSet.has(layer.id);
  const soloed = soloId === layer.id;
  const drum   = isDrum(layer.inst);

  const row = document.createElement("div");
  row.className = "lrow";

  // ── LEFT PANEL ──────────────────────────────────────────────
  const ctrl = document.createElement("div");
  ctrl.className = "lctrl";
  ctrl.style.borderLeft = "3px solid " + col;

  // Header row
  const hdr = document.createElement("div");
  hdr.className = "lhdr";

  const authorEl = document.createElement("span");
  authorEl.className = "l-author";
  authorEl.textContent = layer.author || username;
  authorEl.style.color = col;

  const labelInp = document.createElement("input");
  labelInp.className = "l-label";
  labelInp.value = layer.label || "";
  labelInp.placeholder = "label...";
  labelInp.onchange = () => socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "label", value: labelInp.value });

  const acts = document.createElement("div");
  acts.className = "l-acts";

  const muteBtn = document.createElement("button");
  muteBtn.className = "ibtn" + (muted ? " muted" : "");
  muteBtn.title = "Mute";
  muteBtn.textContent = "M";
  muteBtn.onclick = () => { mutedSet.has(layer.id) ? mutedSet.delete(layer.id) : mutedSet.add(layer.id); buildRack(); };

  const soloBtn = document.createElement("button");
  soloBtn.className = "ibtn" + (soloed ? " soloed" : "");
  soloBtn.title = "Solo";
  soloBtn.textContent = "S";
  soloBtn.onclick = () => { soloId = (soloId === layer.id) ? null : layer.id; buildRack(); };

  const delBtn = document.createElement("button");
  delBtn.className = "ibtn del";
  delBtn.title = "Remove layer";
  delBtn.textContent = "✕";
  delBtn.onclick = () => socket.emit("removeLayer", { beatId: beat.id, layerId: layer.id });

  acts.append(muteBtn, soloBtn, delBtn);
  hdr.append(authorEl, labelInp, acts);
  ctrl.appendChild(hdr);

  // Row 1: instrument + note + sample btn
  const r1 = document.createElement("div");
  r1.className = "lr1";

  const instSel = document.createElement("select");
  instSel.className = "isel";
  for (const [cat, entries] of Object.entries(SYNTHS)) {
    const grp = document.createElement("optgroup");
    grp.label = cat;
    for (const name of Object.keys(entries)) {
      const o = document.createElement("option");
      o.value = o.textContent = name;
      if ((layer.inst || "Grand Piano") === name) o.selected = true;
      grp.appendChild(o);
    }
    instSel.appendChild(grp);
  }
  // Custom sample option
  {
    const grp = document.createElement("optgroup");
    grp.label = "CUSTOM SAMPLE";
    const o = document.createElement("option");
    o.value = "__CUSTOM__";
    o.textContent = customMap[layer.id] ? "▶ " + customMap[layer.id].name : "Upload sample...";
    if (layer.inst === "__CUSTOM__") o.selected = true;
    grp.appendChild(o);
    instSel.appendChild(grp);
  }

  // Hidden file input
  const fileInp = document.createElement("input");
  fileInp.type = "file"; fileInp.accept = "audio/*"; fileInp.style.display = "none";
  fileInp.onchange = async () => {
    const file = fileInp.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const old = synthMap[layer.id];
    if (old) { try { old.node.dispose(); } catch(_) {} }
    const player = new Tone.Player({ url, loop: false }).connect(masterVerb);
    await Tone.loaded();
    player.volume.value = layer.vol ?? -6;
    synthMap[layer.id] = { key: "__CUSTOM__", node: player, isPlayer: true };
    customMap[layer.id] = { url, name: file.name };
    layer.inst = "__CUSTOM__";
    socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "inst", value: "__CUSTOM__" });
    toast("Sample loaded: " + file.name, "ok");
    buildRack();
  };

  instSel.onchange = () => {
    const val = instSel.value;
    if (val === "__CUSTOM__") {
      fileInp.click();
      instSel.value = layer.inst || "Grand Piano"; // revert until upload done
      return;
    }
    layer.inst = val;
    spawnSynth(layer.id, val);
    setVol(layer.id, layer.vol ?? -6);
    socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "inst", value: val });
    // Rebuild to show/hide note selector
    buildRack();
  };

  const noteSel = document.createElement("select");
  noteSel.className = "msel";
  noteSel.style.width = "60px";
  noteSel.style.display = drum ? "none" : "";
  NOTES.forEach(n => {
    const o = document.createElement("option");
    o.value = o.textContent = n;
    if ((layer.note || "C4") === n) o.selected = true;
    noteSel.appendChild(o);
  });
  noteSel.onchange = () => {
    layer.note = noteSel.value;
    socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "note", value: noteSel.value });
  };

  const sampBtn = document.createElement("button");
  sampBtn.className = "samp" + (customMap[layer.id] ? " loaded" : "");
  sampBtn.title = "Upload audio sample";
  sampBtn.textContent = "📁";
  sampBtn.onclick = () => fileInp.click();

  r1.append(instSel, noteSel, sampBtn, fileInp);
  ctrl.appendChild(r1);

  // Row 2: BPM mult + volume
  const r2 = document.createElement("div");
  r2.className = "lr2";

  const bpmSel = document.createElement("select");
  bpmSel.className = "msel";
  bpmSel.title = "Layer speed multiplier";
  const bpmMult = layer.bpmMult || 1;
  bpmSel.innerHTML = `
    <option value="0.5" ${bpmMult===.5?"selected":""}>½× speed</option>
    <option value="1"   ${bpmMult===1 ?"selected":""}>1× speed</option>
    <option value="2"   ${bpmMult===2 ?"selected":""}>2× speed</option>
  `;
  bpmSel.onchange = () => {
    const v = parseFloat(bpmSel.value);
    layer.bpmMult = v;
    socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "bpmMult", value: v });
  };

  const volRow  = document.createElement("div"); volRow.className = "vol-row";
  const volLbl  = document.createElement("span"); volLbl.className = "vol-lbl"; volLbl.textContent = "VOL";
  const volSl   = document.createElement("input"); volSl.type = "range"; volSl.min = -36; volSl.max = 6; volSl.value = layer.vol ?? -6;
  const volNum  = document.createElement("span"); volNum.className = "vol-num"; volNum.textContent = (layer.vol ?? -6) + "dB";

  volSl.addEventListener("input", () => {
    const v = parseFloat(volSl.value);
    volNum.textContent = v + "dB";
    setVol(layer.id, v);
  });
  volSl.addEventListener("change", () => {
    const v = parseFloat(volSl.value);
    layer.vol = v;
    socket.emit("updateLayer", { beatId: beat.id, layerId: layer.id, key: "vol", value: v });
  });

  volRow.append(volLbl, volSl, volNum);
  r2.append(bpmSel, volRow);
  ctrl.appendChild(r2);
  row.appendChild(ctrl);

  // ── STEP BUTTONS ─────────────────────────────────────────────
  const stepsEl = document.createElement("div");
  stepsEl.className = "steps";
  layerBtns[layer.id] = [];

  const onColor = drum ? col : "var(--accent)";

  (layer.pattern || []).forEach((active, i) => {
    if (i > 0 && i % 4 === 0) {
      const g = document.createElement("div"); g.className = "sgap"; stepsEl.appendChild(g);
    }
    const btn = document.createElement("button");
    btn.className = "sbtn " + (Math.floor(i/4)%2===0?"d0":"d1") + (active?" on":"");
    btn.style.background = active ? onColor : "";

    btn.onclick = () => {
      const cur = layer.pattern[i];
      layer.pattern[i] = !cur;
      btn.style.background = layer.pattern[i] ? onColor : "";
      layer.pattern[i] ? btn.classList.add("on") : btn.classList.remove("on");
      socket.emit("toggleStep", { beatId: beat.id, layerId: layer.id, stepIndex: i, val: layer.pattern[i] });
    };

    stepsEl.appendChild(btn);
    layerBtns[layer.id].push(btn);
  });

  row.appendChild(stepsEl);
  rack.appendChild(row);
}

// ════════════════════════════════════════════════════════════════
//  SOCKET SETUP
// ════════════════════════════════════════════════════════════════
function setupSocket() {
  socket.on("connect", () => {
    document.getElementById("status").textContent = "LIVE";
    document.getElementById("status").classList.add("live");
  });
  socket.on("disconnect", () => {
    document.getElementById("status").textContent = "OFFLINE";
    document.getElementById("status").classList.remove("live");
  });

  // Full state sync (init + project load + beat switch)
  socket.on("state", (newState) => {
    S = newState;
    Tone.Transport.bpm.value = S.bpm;
    buildUI();
  });

  // Surgical step update (no full rebuild)
  socket.on("stepToggled", ({ beatId, layerId, stepIndex, val }) => {
    const beat = S.beats.find(b => b.id === beatId); if (!beat) return;
    const layer = beat.layers.find(l => l.id === layerId); if (!layer) return;
    layer.pattern[stepIndex] = val;
    const btns = layerBtns[layerId];
    if (!btns || !btns[stepIndex]) return;
    const col = userColor(layer.author || username);
    const onColor = isDrum(layer.inst) ? col : "var(--accent)";
    btns[stepIndex].style.background = val ? onColor : "";
    val ? btns[stepIndex].classList.add("on") : btns[stepIndex].classList.remove("on");
  });

  // Play/pause
  socket.on("playUpdate", (p) => {
    playing = p;
    const btn = document.getElementById("play-btn");
    if (p) { Tone.Transport.start(); btn.textContent = "⏸ PAUSE"; btn.classList.add("on"); }
    else   { Tone.Transport.pause(); btn.textContent = "▶ PLAY";  btn.classList.remove("on"); }
  });

  // BPM
  socket.on("bpmUpdate", (v) => {
    S.bpm = v;
    Tone.Transport.bpm.value = v;
    document.getElementById("bpm-sl").value = v;
    document.getElementById("bpm-val").textContent = v;
  });

  // Saved project list
  socket.on("projectList", (list) => {
    const sel = document.getElementById("proj-loader");
    sel.innerHTML = '<option value="">LOAD PROJECT...</option>';
    list.forEach(name => {
      const o = document.createElement("option"); o.value = o.textContent = name; sel.appendChild(o);
    });
  });

  socket.on("userCount", c => { document.getElementById("users").textContent = "● " + c; });
  socket.on("toast", (msg, type) => toast(msg, type || ""));
}

// ════════════════════════════════════════════════════════════════
//  TRANSPORT  (called from HTML onclick)
// ════════════════════════════════════════════════════════════════
W.togglePlay   = () => socket && socket.emit("togglePlay", !playing);
W.stopTransport = () => {
  if (socket) socket.emit("togglePlay", false);
  tick32 = 0;
  Tone.Transport.stop();
  Tone.Transport.position = 0;
  Object.values(layerBtns).forEach(btns => btns.forEach(b => b.classList.remove("hd")));
};
W.clearGrid    = () => { const b = getActiveBeat(); if (b && socket) socket.emit("clearGrid", b.id); };
W.bpmUI        = (v) => { document.getElementById("bpm-val").textContent = v; Tone.Transport.bpm.value = v; };
W.sendBPM      = (v) => socket && socket.emit("setBPM", v);
W.changeSteps  = (v) => socket && socket.emit("changeSteps", v);

// ════════════════════════════════════════════════════════════════
//  PROJECT
// ════════════════════════════════════════════════════════════════
W.saveProject = () => {
  const name = prompt("Save project as:", S.projectName);
  if (name && name.trim() && socket) socket.emit("saveProject", name.trim());
};
W.renameProject = () => {
  const name = prompt("Rename project:", S.projectName);
  if (name && name.trim() && socket) socket.emit("renameProject", name.trim());
};
W.loadProject = (name) => {
  if (!name || !socket) return;
  // Reset local audio state — loaded project starts fresh
  for (const id of Object.keys(synthMap)) { try { synthMap[id].node.dispose(); } catch(_) {} }
  synthMap  = {};
  customMap = {};
  mutedSet  = new Set();
  soloId    = null;
  socket.emit("loadProject", name);
  document.getElementById("proj-loader").value = "";
};

// ════════════════════════════════════════════════════════════════
//  BEATS
// ════════════════════════════════════════════════════════════════
W.addBeat = () => {
  const name = prompt("Beat name:", "Beat " + (S.beats.length + 1));
  if (name && name.trim() && socket) socket.emit("addBeat", name.trim());
};

// ════════════════════════════════════════════════════════════════
//  EXPORT / RECORD
// ════════════════════════════════════════════════════════════════
W.toggleRecord = async () => {
  if (!recorder) { toast("Start the studio first", "err"); return; }
  if (!recording) {
    await recorder.start();
    recording = true;
    document.getElementById("rec-btn").textContent = "⬤ STOP";
    document.getElementById("rec-btn").classList.add("on");
    toast("Recording...");
  } else {
    recording = false;
    document.getElementById("rec-btn").textContent = "⬤ RECORD";
    document.getElementById("rec-btn").classList.remove("on");
    const blob = await recorder.stop();
    await processAndDownload(blob);
  }
};

W.exportAudio = async () => {
  if (!recorder) { toast("Start the studio first", "err"); return; }
  if (recording) { toast("Stop recording first", "err"); return; }
  if (!playing)  { toast("Press PLAY first, then export", "err"); return; }

  const bars = 2;
  const dur  = bars * S.steps * (60 / S.bpm / 4) * 1000 + 300;
  toast("Auto-recording " + bars + " bars...");
  await recorder.start();
  await new Promise(r => setTimeout(r, dur));
  const blob = await recorder.stop();
  await processAndDownload(blob);
};

async function processAndDownload(webmBlob) {
  toast("Encoding...");
  try {
    const ab      = await webmBlob.arrayBuffer();
    const actx    = new AudioContext();
    const decoded = await actx.decodeAudioData(ab);
    const nch     = decoded.numberOfChannels;
    const sr      = decoded.sampleRate;
    const L       = decoded.getChannelData(0);
    const R       = nch > 1 ? decoded.getChannelData(1) : L;

    const f2i = f32 => {
      const o = new Int16Array(f32.length);
      for (let i=0; i<f32.length; i++) o[i] = Math.max(-32768, Math.min(32767, f32[i]*32768));
      return o;
    };

    const enc   = new lamejs.Mp3Encoder(nch, sr, 128);
    const block = 1152;
    const parts = [];
    for (let i=0; i<L.length; i+=block) {
      const out = nch > 1
        ? enc.encodeBuffer(f2i(L.subarray(i,i+block)), f2i(R.subarray(i,i+block)))
        : enc.encodeBuffer(f2i(L.subarray(i,i+block)));
      if (out.length) parts.push(new Int8Array(out));
    }
    const fl = enc.flush();
    if (fl.length) parts.push(new Int8Array(fl));

    dlBlob(new Blob(parts, { type:"audio/mp3" }), (S.projectName||"session")+".mp3");
    toast("MP3 exported!", "ok");
  } catch(e) {
    console.warn("MP3 encode failed:", e);
    dlBlob(webmBlob, (S.projectName||"session")+".webm");
    toast("Saved as WebM", "err");
  }
}

function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── kick off ────────────────────────────────────────────────────
boot();
</script>
